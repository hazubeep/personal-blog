<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Article</title>
    <style>
      /* Menggunakan font modern yang mirip dengan gaya kasual di gambar */
      @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap");

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Comic Neue", "Comic Sans MS", sans-serif;
      }

      body {
        background-color: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      /* Container Utama */
      .card-container {
        background-color: #fdfdfd;
        border: 3px solid #1a1a1a;
        border-radius: 12px;
        width: 100%;
        max-width: 450px;
        padding: 30px 24px;
        box-shadow: 6px 6px 0px #1a1a1a; /* Efek shadow ala komik/wireframe */
      }

      /* Judul */
      h2 {
        font-size: 28px;
        color: #1a1a1a;
        margin-bottom: 24px;
        font-weight: 700;
      }

      /* Form Group */
      .form-group {
        margin-bottom: 16px;
      }

      /* Input & Textarea */
      .form-control {
        width: 100%;
        padding: 12px 16px;
        font-size: 16px;
        border: 3px solid #1a1a1a;
        border-radius: 8px;
        background-color: #ffffff;
        color: #1a1a1a;
        outline: none;
        font-weight: 700;
      }

      .form-control::placeholder {
        color: #555;
        opacity: 1;
      }

      textarea.form-control {
        height: 250px;
        resize: vertical;
        font-weight: normal; /* Konten artikel biasanya menggunakan font reguler */
      }

      /* Efek Fokus pada Input */
      .form-control:focus {
        background-color: #f7f9fa;
        border-color: #007bff;
      }

      /* Tombol Update */
      .btn-update {
        background-color: #ffffff;
        color: #1a1a1a;
        border: 3px solid #1a1a1a;
        border-radius: 8px;
        padding: 10px 28px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 3px 3px 0px #1a1a1a;
        margin-top: 8px;
      }

      /* Efek Hover & Active Tombol */
      .btn-update:hover {
        background-color: #f0f0f0;
        transform: translate(-1px, -1px);
        box-shadow: 4px 4px 0px #1a1a1a;
      }

      .btn-update:active {
        transform: translate(3px, 3px);
        box-shadow: 0px 0px 0px #1a1a1a;
      }
    </style>
  </head>
  <body>
    <div class="card-container">
      <h2>Update Article</h2>

      <form action="/new" method="POST">
        <div class="form-group">
          <input
            type="text"
            class="form-control"
            name="title"
            placeholder="Article Title"
            required
          />
        </div>

        <div class="form-group">
          <input
            type="date"
            class="form-control"
            placeholder="Publishing Date"
            name="createdAt"
            required
          />
        </div>

        <div class="form-group">
          <textarea
            class="form-control"
            placeholder="Content"
            name="content"
            required
          >
          </textarea>
        </div>

        <button type="submit" class="btn-update">Create</button>
      </form>
    </div>
  </body>
</html>
