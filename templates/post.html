<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post's Detail</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f2f5;
        font-family: "Comic Neue", "Comic Sans MS", sans-serif;
      }

      .card {
        background-color: #fdfdfd;
        border: 3px solid #1a1a1a;
        border-radius: 12px;
        padding: 30px 40px;
        width: 350px;
        box-shadow: 6px 6px 0px #1a1a1a;
      }

      .card h1 {
        color: #2a2a2a;
        font-size: 28px;
        margin-top: 0;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
      }

      .post-date {
        color: #8fa0af;
        font-weight: bold;
        font-size: 15px;
        display: block;
        margin-bottom: 20px;
      }

      .card p {
        color: #2a2a2a;
        font-size: 16px;
        line-height: 1.5;
        margin: 0;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>{{.Title}}</h1>
      <span class="post-date">{{.CreatedAt.Format "2 January 2006"}}</span>
      <p>{{.Content}}</p>
    </div>
  </body>
</html>
