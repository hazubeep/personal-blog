<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Personal Blog</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap");
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f2f5;
        font-family: "Comic Neue", "Comic Sans MS", sans-serif;
      }

      a {
        text-decoration: none;
        color: #8fa0af;
      }

      .card {
        background-color: #fdfdfd;
        border: 3px solid #1a1a1a;
        border-radius: 8px;
        padding: 30px 40px;
        width: 350px;
        box-shadow: 6px 6px 0px #1a1a1a;
      }

      .card h1 {
        color: #2a2a2a;
        font-size: 28px;
        margin-top: 0;
        letter-spacing: 0.5px;
      }

      .logo {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .add-btn {
        font-weight: bold;
        font-size: 18px;
      }

      .add-btn:hover {
        text-decoration: underline;
      }

      .article-list {
        list-style-type: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .article-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .article-title {
        color: #2a2a2a;
        font-weight: bold;
        font-size: 18px;
        max-width: 25ch;
        text-decoration: none;
        transition:
          color 0.2s ease,
          transform 0.2s ease;
      }

      .article-title:hover {
        color: #8fa0af;
        text-decoration: underline;
      }

      .action-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        color: #8fa0af;
        font-weight: bold;
        font-size: 15px;
      }

      .action-btn form button {
        color: red;
        font-weight: inherit;
        font-size: inherit;
        border: none;
        background-color: transparent;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <h1>Personal Blog</h1>
        <a href="/new" class="add-btn">+ Add</a>
      </div>
      <ul class="article-list">
        {{range .}}
        <li class="article-item">
          <a href="/article/{{.ID}}" class="article-title">{{.Title}}</a>
          <span class="action-btn">
            <a href="/edit/{{.ID}}">Edit</a>
            <form action="/delete/{{.ID}}">
              <button type="submit">Delete</button>
            </form>
          </span>
        </li>
        {{end}}
      </ul>
    </div>
  </body>
</html>
