<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Blog</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap");
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f2f5;
        font-family: "Comic Neue", "Comic Sans MS", sans-serif;
      }

      .card {
        background-color: #fdfdfd;
        border: 3px solid #1a1a1a;
        border-radius: 12px;
        padding: 30px 40px;
        width: 350px;
        box-shadow: 6px 6px 0px #1a1a1a;
      }

      .card h1 {
        color: #2a2a2a;
        font-size: 28px;
        margin-top: 0;
        letter-spacing: 0.5px;
      }

      .post-list {
        list-style-type: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
      }

      .post-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .post-title {
        color: #2a2a2a;
        font-weight: bold;
        font-size: 18px;
        max-width: 25ch;
        text-decoration: none;
        transition:
          color 0.2s ease,
          transform 0.2s ease;
      }

      .post-title:hover {
        color: #8fa0af;
        text-decoration: underline;
      }

      .post-date {
        color: #8fa0af;
        font-weight: bold;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Personal Blog</h1>
      <ul class="post-list">
        {{range .}}
        <li class="post-item">
          <a href="/posts/{{.ID}}" class="post-title">{{.Title}}</a>
          <span class="post-date">
            <p>{{.CreatedAt.Format "2006-01-02"}}</p>
          </span>
        </li>
        {{end}}
      </ul>
    </div>
  </body>
</html>
